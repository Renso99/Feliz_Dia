<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<title>Día de la Mujer</title>

<style>
/* TEXTO SUPERIOR IZQUIERDO */

.textoSuperior{
position:fixed;
top:20px;
left:25px;
font-family:'Great Vibes', cursive;
font-size:38px;
color:#ff4fa3;
text-shadow:2px 2px 10px rgba(0,0,0,0.2);
z-index:50;
}

/* TEXTO INFERIOR DERECHO */

.textoInferior{
position:fixed;
bottom:20px;
right:30px;
font-family:'Great Vibes', cursive;
font-size:34px;
color:#ff4fa3;
text-shadow:2px 2px 10px rgba(0,0,0,0.2);
z-index:50;
}

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#ff9ecb,#ffd6ea);
font-family:Arial;
overflow:hidden;
}

/* PANTALLA INICIAL */

.pantallaInicio{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#ff9ecb,#ffd6ea);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:100;
text-align:center;
}

.pantallaInicio h1{
font-size:40px;
color:white;
}

.pantallaInicio p{
font-size:20px;
color:white;
margin-bottom:30px;
}

.pantallaInicio button{
padding:15px 40px;
font-size:20px;
border:none;
border-radius:30px;
background:#ff4fa3;
color:white;
cursor:pointer;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
transition:0.3s;
}

.pantallaInicio button:hover{
transform:scale(1.1);
}

/* NOMBRE */

.nombre{
color:#ff69b4;
font-family:'Brush Script MT',cursive;
font-size:32px;
font-weight:bold;
}

/* CONTENEDOR */

.container{
display:flex;
align-items:center;
gap:60px;
background:white;
padding:50px;
border-radius:20px;
box-shadow:0 30px 60px rgba(0,0,0,0.25);
z-index:10;
}

/* TEXTO */

.texto{
width:350px;
font-size:22px;
line-height:1.6;
}

.cursor{
display:inline-block;
width:3px;
background:black;
margin-left:3px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0}
100%{opacity:1}
}

/* VIDEO */

.video video{
width:260px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
animation:flotar 4s ease-in-out infinite;
}

@keyframes flotar{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

/* ELEMENTOS QUE CAEN */

.elemento{
position:absolute;
top:-50px;
animation:caer linear infinite;
}

@keyframes caer{
0%{
transform:translateY(-50px) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}

</style>
</head>

<body>
<div class="textoSuperior">
💐 Feliz Día de la Mujer, Medali
</div>

<div class="textoInferior">
Renso
</div>

<!-- PANTALLA INICIAL -->

<div id="inicio" class="pantallaInicio">

<h1>💖 Esto es para ti, Medali</h1>
<p>He preparado algo especial para este día.</p>

<button onclick="iniciarSorpresa()">Ver sorpresa</button>

</div>

<!-- CONTENIDO PRINCIPAL -->

<div class="container">

<div class="texto">
<span id="mensaje"></span><span class="cursor"></span>
</div>

<div class="video">
<video id="videoMujer" loop playsinline>
<source src="video.mp4" type="video/mp4">
</video>
</div>

</div>

<script>

/* INICIAR SORPRESA */

function iniciarSorpresa(){

document.getElementById("inicio").style.display="none"

video.play()

escribir()

}

/* VIDEO */

const video=document.getElementById("videoMujer")

video.volume=1
video.muted=false

/* MENSAJES */

const texto=document.getElementById("mensaje")

const frases=[

"🌸 Hoy es el Día de la Mujer y, aunque nos conocemos hace poco, quería tomarme un momento para decirte algo.",

"✨ Desde que empezamos a hablar sentí que eras una persona diferente.",

"💖 Me gusta mucho la energía que transmites y lo natural que se sienten las conversaciones contigo.",

"🌷 En poco tiempo me he dado cuenta de que eres alguien muy agradable de conocer.",

"🌼 No siempre es fácil encontrar personas con una vibra tan bonita.",

"💫 Por eso me alegra mucho haber coincidido contigo.",

"🌹 Hoy solo quería decirte algo sencillo, pero muy sincero:",

"💖 Me alegra haberte conocido, <span class='nombre'>Medali</span>. 😊"

]

let fraseIndex=0
let letraIndex=0

function escribir(){

if(fraseIndex === frases.length-1){

texto.innerHTML = frases[fraseIndex]
return

}

if(letraIndex < frases[fraseIndex].length){

texto.innerHTML += frases[fraseIndex].charAt(letraIndex)

letraIndex++

setTimeout(escribir,40)

}else{

fraseIndex++

if(fraseIndex < frases.length){

setTimeout(()=>{

texto.innerHTML=""
letraIndex=0

escribir()

},5000)

}

}

}

/* CORAZONES Y PALABRAS */

function crearElemento(){

const elemento=document.createElement("div")

elemento.classList.add("elemento")

const emojis=["💖","🌼","🌸","🌹"]

const palabras=[
"Medali","Especial","Auténtica","Alegre","Amable",
"Encantadora","Única","Brillante","Dulce",
"Inspiradora","Sonrisa","Bonita","✨"
]

if(Math.random()<0.6){

elemento.innerHTML=emojis[Math.floor(Math.random()*emojis.length)]

}else{

elemento.innerHTML=palabras[Math.floor(Math.random()*palabras.length)]

elemento.style.color="#ff69b4"
elemento.style.fontWeight="bold"

}

elemento.style.left=Math.random()*100+"vw"

elemento.style.fontSize=(Math.random()*15+15)+"px"

elemento.style.animationDuration=(Math.random()*5+5)+"s"

document.body.appendChild(elemento)

setTimeout(()=>{elemento.remove()},9000)

}

setInterval(crearElemento,400)

/* FUEGOS ARTIFICIALES */

function crearFuegoArtificial(){

const x=Math.random()*window.innerWidth
const y=Math.random()*window.innerHeight*0.6

for(let i=0;i<25;i++){

const p=document.createElement("div")

p.style.position="absolute"
p.style.left=x+"px"
p.style.top=y+"px"

p.style.width="6px"
p.style.height="6px"
p.style.borderRadius="50%"

p.style.background=`hsl(${Math.random()*360},100%,60%)`

document.body.appendChild(p)

const angulo=Math.random()*2*Math.PI
const distancia=Math.random()*120

const dx=Math.cos(angulo)*distancia
const dy=Math.sin(angulo)*distancia

p.animate(
[
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${dx}px,${dy}px)`,opacity:0}
],
{
duration:1200,
easing:"ease-out"
})

setTimeout(()=>{p.remove()},1200)

}

}

setInterval(crearFuegoArtificial,1500)

</script>

</body>
</html>
